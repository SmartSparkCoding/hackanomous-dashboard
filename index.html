<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <aside id="sidebar" class="sidebar" aria-label="Main menu">
      <div class="sidebar-inner">
        <div class="sidebar-top">
          <div class="spacer"></div>
        </div>

        <nav class="sidebar-nav" role="navigation" aria-label="Primary">
          <button class="nav-item" data-route="dashboard" aria-current="page">Dashboard</button>
          <button class="nav-item" data-route="projects">My Projects</button>
          <button class="nav-item" data-route="explore">Explore</button>
          <button class="nav-item" data-route="shop">Shop</button>
        </nav>

        <div class="sidebar-bottom">
          <div class="profile">
            <div id="pfp" class="pfp-square" aria-hidden="true">J</div>
            <div class="profile-meta">
              <div id="profileName" class="profile-name">Jacob</div>
              <div class="profile-points">Points: <span id="profilePoints">1240</span></div>
            </div>
          </div>
          <div class="sidebar-actions">
            <button id="logoutBtn" class="btn danger">Log out</button>
          </div>
        </div>
      </div>
    </aside>

    <main id="main" class="main">
      <div id="pageContent" class="page-content" role="main" tabindex="-1"></div>
    </main>
  </div>

  <!-- Templates -->
  <template id="dashboardTpl">
    <section class="page">
      <div class="page-header">
        <h1 class="page-title">Dashboard</h1>
        <p class="subtitle">Welcome back — here’s what’s new.</p>
      </div>

      <div class="card projects-card">
        <div class="card-head">
          <div class="card-title">Your projects</div>
          <div><button class="btn small" data-action="gotoProjects">Go to full list</button></div>
        </div>
        <div class="card-body projects-grid" id="projectsPreview"></div>
      </div>

      <div id="announcementsList" class="announcements"></div>
    </section>
  </template>

  <template id="projectsTpl">
    <section class="page">
      <div class="page-header">
        <h1 class="page-title">My Projects</h1>
        <p class="subtitle">All your projects in one place.</p>
      </div>

      <div class="controls-row">
        <div class="filters">Filter:
          <select id="projectFilter">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="archived">Archived</option>
          </select>
        </div>
        <div><button id="createProjectBtn" class="btn">Create new project</button></div>
      </div>

      <div id="projectsList" class="grid projects-grid"></div>
    </section>
  </template>

  <template id="shopTpl">
    <section class="page">
      <div class="page-header">
        <h1 class="page-title">Shop</h1>
        <p class="subtitle">Spend your points on club swag and perks.</p>
      </div>

      <div class="center-box">
        <div class="points-box card">
          <div class="small-label">Your points</div>
          <div class="points-number" id="shopPoints">1240</div>
          <p class="muted">Shop items cost points. Click More info for details.</p>
          <button id="yourOrdersBtn" class="btn full">Your orders</button>
        </div>
      </div>

      <div id="shopItems" class="grid shop-grid"></div>
    </section>
  </template>

  <template id="exploreTpl">
    <section class="page">
      <div class="page-header">
        <h1 class="page-title">Explore</h1>
        <p class="subtitle">Discover projects and items from the community.</p>
      </div>
      <div class="card"><p class="muted">Explore content will appear here.</p></div>
    </section>
  </template>

  <!-- Modal for project / item details -->
  <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-panel" role="document" id="modalPanel">
      <button id="modalClose" class="modal-close" aria-label="Close">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
